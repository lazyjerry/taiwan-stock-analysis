- id: dedup-skip-sort
  args:
    - - data:
          - ["113/07/02", "1000", "2000", "30", "31", "29", "30.5", "+0.5", "100"]
          - ["113/07/01", "900", "1800", "29", "30", "28", "29.5", "+0.3", "90"]
          - ["113/07/03", "short"]                                # <9 欄 → 跳過
      - data:
          - ["113/07/02", "9", "9", "9", "9", "9", "9", "+0", "0"]  # 日期重複 → 跳過
