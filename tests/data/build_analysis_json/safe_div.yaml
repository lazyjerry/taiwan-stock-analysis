# safe_div(numerator, denominator, scale=100)：安全除法，預設回傳百分比
# 業務邏輯：分子 None 或分母 None/0 → None，否則 num/den*scale
- id: normal              # 正常：50/100*100 = 50%（如毛利率）
  args: [50, 100]
  expected: 50.0
- id: zero-denominator    # 分母 0 → 防呆回 None（無營收時算毛利率）
  args: [1, 0]
  expected: ~
- id: none-numerator      # 分子缺值 → None
  args: [~, 100]
  expected: ~
- id: none-denominator    # 分母缺值 → None
  args: [5, ~]
  expected: ~
- id: negative            # 負分子照算（如虧損年度淨利率）
  args: [-50, 100]
  expected: -50.0
- id: scale-1             # scale=1.0 用於 cfo_to_net（倍數而非百分比）
  args: [3, 4]
  kwargs: {scale: 1.0}
  expected: 0.75
